{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/css/bootstrap.min.css" rel="stylesheet">
    <title>Prediction_of_Smartphone_Addiction</title>
    <style>
        body {
            display: flex;
            min-height: 100vh;
            margin: 0;
            background-color: transparent;
            color: white;
        }

        /* Background Mesh/Space */
        .space-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: linear-gradient(-45deg, #09081a, #200f45, #0a1128, #18002a);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            z-index: -3; 
            pointer-events: none;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        /* Particles and Glowing Orbs Container */
        .particles-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            z-index: -2;
            pointer-events: none;
            overflow: hidden;
        }

        /* Huge Glowing Background Orbs */
        .glow-orb-bg {
            position: absolute;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.7;
            animation: floatOrb 25s infinite alternate ease-in-out;
        }

        .orb-bg-1 { width: 50vw; height: 50vw; background: rgba(112, 0, 255, 0.4); top: -20%; left: -10%; animation-duration: 30s; }
        .orb-bg-2 { width: 40vw; height: 40vw; background: rgba(0, 240, 255, 0.3); bottom: -10%; right: -10%; animation-duration: 25s; animation-direction: alternate-reverse; }
        .orb-bg-3 { width: 35vw; height: 35vw; background: rgba(255, 42, 95, 0.25); top: 30%; left: 50%; animation-duration: 35s; }
        .orb-bg-4 { width: 45vw; height: 45vw; background: rgba(112, 0, 255, 0.35); bottom: 10%; left: 10%; animation-duration: 28s; animation-direction: alternate-reverse; }

        @keyframes floatOrb {
            0% { transform: translateY(0) translateX(0) scale(1); }
            50% { transform: translateY(-80px) translateX(60px) scale(1.1); }
            100% { transform: translateY(40px) translateX(-80px) scale(0.9); }
        }

        .particle {
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 15px 3px rgba(255, 255, 255, 0.8);
            animation: drifting 20s cubic-bezier(0.4, 0, 0.2, 1) infinite;
        }

        /* Particle variations - Much larger and brighter */
        .p1 { width: 8px; height: 8px; top: 15%; left: 20%; animation-duration: 25s; }
        .p2 { width: 15px; height: 15px; top: 35%; left: 85%; animation-duration: 20s; animation-delay: -5s; background: #00f0ff; box-shadow: 0 0 25px 8px rgba(0, 240, 255, 0.6); }
        .p3 { width: 6px; height: 6px; top: 65%; left: 45%; animation-duration: 30s; animation-delay: -10s; }
        .p4 { width: 20px; height: 20px; top: 75%; left: 15%; animation-duration: 18s; animation-delay: -2s; background: #7000ff; box-shadow: 0 0 30px 10px rgba(112, 0, 255, 0.7); }
        .p5 { width: 10px; height: 10px; top: 45%; left: 65%; animation-duration: 22s; animation-delay: -8s; }
        .p6 { width: 16px; height: 16px; top: 20%; left: 95%; animation-duration: 28s; animation-delay: -15s; background: #ff2a5f; box-shadow: 0 0 25px 8px rgba(255, 42, 95, 0.6); }
        .p7 { width: 9px; height: 9px; top: 80%; left: 80%; animation-duration: 24s; animation-delay: -12s; }
        .p8 { width: 22px; height: 22px; top: 55%; left: 25%; animation-duration: 19s; animation-delay: -4s; background: #00f0ff; box-shadow: 0 0 30px 10px rgba(0, 240, 255, 0.6); }
        .p9 { width: 7px; height: 7px; top: 95%; left: 55%; animation-duration: 26s; animation-delay: -9s; }
        .p10 { width: 12px; height: 12px; top: 10%; left: 55%; animation-duration: 21s; animation-delay: -6s; background: #7000ff; box-shadow: 0 0 20px 8px rgba(112, 0, 255, 0.7); }
        .p11 { width: 18px; height: 18px; top: 25%; left: 40%; animation-duration: 23s; animation-delay: -3s; background: #00f0ff; box-shadow: 0 0 25px 8px rgba(0, 240, 255, 0.5); }
        .p12 { width: 14px; height: 14px; top: 85%; left: 35%; animation-duration: 27s; animation-delay: -7s; background: #ff2a5f; box-shadow: 0 0 20px 8px rgba(255, 42, 95, 0.5); }

        @keyframes drifting {
            0% { transform: translate(0, 0) scale(1); opacity: 0.3; }
            25% { transform: translate(80px, -120px) scale(1.4); opacity: 1; }
            50% { transform: translate(-50px, -240px) scale(0.7); opacity: 0.6; }
            75% { transform: translate(-100px, -100px) scale(1.3); opacity: 0.9; }
            100% { transform: translate(0, 0) scale(1); opacity: 0.3; }
        }
        /* NAVBAR */
        .glass-nav { position: fixed; top: 0; left: 0; width: 100%; box-sizing: border-box; padding: 1rem 3%; display: flex; justify-content: space-between; align-items: center; background: rgba(20, 20, 30, 0.4); backdrop-filter: blur(16px); -webkit-backdrop-filter: blur(16px); border-bottom: 1px solid rgba(255, 255, 255, 0.08); z-index: 100; }
        .logo { font-size: 1.5rem; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #e2e8f0; }
        .logo .dot { color: #00f0ff; }
        .nav-links { display: flex; gap: 2.5rem; list-style: none; align-items: center; margin: 0;}
        .nav-links li { margin: 0; padding: 0; }
        .nav-links a { color: #e2e8f0; text-decoration: none; font-weight: 600; font-size: 1rem; transition: color 0.3s ease; }
        .nav-links a:hover { color: #00f0ff; }
        .nav-links .btn-primary { background: #00f0ff; border: 1px solid #00f0ff; color: #080015 !important; padding: 0.6rem 1.5rem; border-radius: 30px; box-shadow: 0 0 15px rgba(0, 240, 255, 0.4); transition: all 0.3s ease; display: inline-block; font-weight: bold; }
        .nav-links .btn-primary:hover { background: #00f0ff; color: #080015 !important; box-shadow: 0 0 25px rgba(0, 240, 255, 0.6); }

        .main-content {
            margin-top: 100px;
            width: 100%;
        }

        h1, h2 {
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
        }
        form { margin: 0; }
    </style>
</head>
<body>
    <div class="space-background"></div>
    <div class="particles-container">
        <!-- Giant glowing background orbs -->
        <div class="glow-orb-bg orb-bg-1"></div>
        <div class="glow-orb-bg orb-bg-2"></div>
        <div class="glow-orb-bg orb-bg-3"></div>
        <div class="glow-orb-bg orb-bg-4"></div>

        <!-- Floating glowing particles -->
        <div class="particle p1 parallax-layer" data-speed="0.05"></div>
        <div class="particle p2 parallax-layer" data-speed="0.1"></div>
        <div class="particle p3 parallax-layer" data-speed="0.02"></div>
        <div class="particle p4 parallax-layer" data-speed="0.08"></div>
        <div class="particle p5 parallax-layer" data-speed="0.12"></div>
        <div class="particle p6 parallax-layer" data-speed="0.03"></div>
        <div class="particle p7 parallax-layer" data-speed="0.07"></div>
        <div class="particle p8 parallax-layer" data-speed="0.09"></div>
        <div class="particle p9 parallax-layer" data-speed="0.11"></div>
        <div class="particle p10 parallax-layer" data-speed="0.04"></div>
        <div class="particle p11 parallax-layer" data-speed="0.06"></div>
        <div class="particle p12 parallax-layer" data-speed="0.15"></div>
    </div>
    <nav class="glass-nav">
        <div class="logo">SPA<span class="dot">.</span></div>
        <ul class="nav-links">
            <li><a href="{% url 'index' %}">Home</a></li>
            <li><a href="{% url 'UserLogin' %}">User Login</a></li>
            <li><a href="{% url 'UserRegisterForm' %}">Create Account</a></li>
            <li><a href="{% url 'AdminLogin' %}" class="btn-primary">Admin</a></li>
        </ul>
    </nav>
    
    <div class="main-content">
        {% block contents %}
        {% endblock %}
    </div>

<script src="https://code.jquery.com/jquery-3.5.1.slim.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.9.3/dist/umd/popper.min.js"></script>
<script src="https://maxcdn.bootstrapcdn.com/bootstrap/4.5.2/js/bootstrap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

{% comment %} <footer>
    <p>&copy; 2025 Antenna Performance Prediction. All Rights Reserved.</p>
</footer> {% endcomment %}

<script>
    // Smooth Mouse and Scroll Parallax Effect
    let mouseX = window.innerWidth / 2;
    let mouseY = window.innerHeight / 2;
    let currentX = window.innerWidth / 2;
    let currentY = window.innerHeight / 2;

    document.addEventListener('mousemove', (e) => {
        mouseX = e.pageX;
        mouseY = e.pageY;
    });
    
    function animateParallax() {
        if(window.innerWidth >= 968) {
            currentX += (mouseX - currentX) * 0.08;
            currentY += (mouseY - currentY) * 0.08;

            const layers = document.querySelectorAll('.parallax-layer');
            
            layers.forEach(layer => {
                let speed = parseFloat(layer.getAttribute('data-speed')) || 0;
                if(speed !== 0) {
                    speed = speed * 1.5;
                    const x = (window.innerWidth / 2 - currentX) * speed;
                    const y = (window.innerHeight / 2 - currentY) * speed;
                    
                    const scrollY = window.scrollY;
                    const scrollParallax = scrollY * (speed * -3);
                    
                    layer.style.transform = `translateX(${x}px) translateY(${y + scrollParallax}px)`;
                }
            });
        }
        requestAnimationFrame(animateParallax);
    }
    
    animateParallax();
</script>

</body>
</html>
